# ─────────────────────────────────────────────
# configs/train_config.yaml  –  Supervised pre-training
# ─────────────────────────────────────────────

# ── Data ──────────────────────────────────────
data:
  train_dir: "data/train"
  val_dir:   "data/val"
  image_size: 896          # px per side after resize/pad
  max_seq_len: 4096        # max LaTeX tokens
  num_workers: 4
  pdf_dpi: 150             # DPI for PDF → image rendering

# ── Model ─────────────────────────────────────
model:
  # Vision encoder
  patch_size: 16
  encoder_dim: 768
  encoder_layers: 12
  encoder_heads: 12
  encoder_mlp_ratio: 4.0
  encoder_dropout: 0.1

  # LaTeX decoder
  decoder_dim: 768
  decoder_layers: 12
  decoder_heads: 12
  decoder_mlp_ratio: 4.0
  decoder_dropout: 0.1
  vocab_size: 8192         # LaTeX BPE vocabulary
  max_position_embeddings: 4096

  # Cross-attention
  cross_attn_every_n_layers: 1

  # Pretrained backbone (optional)
  vision_backbone: "google/vit-base-patch16-224"  # set null to train from scratch
  init_from_pretrained: true

# ── Training ──────────────────────────────────
training:
  epochs: 50
  batch_size: 8
  gradient_accumulation_steps: 4   # effective batch = 32
  learning_rate: 3.0e-4
  warmup_steps: 2000
  weight_decay: 0.01
  max_grad_norm: 1.0
  lr_scheduler: "cosine"           # cosine | linear | constant

  # Label smoothing for cross-entropy
  label_smoothing: 0.1

  # Mixed precision
  fp16: false
  bf16: true

  # Checkpointing
  checkpoint_dir: "checkpoints/pretrain"
  save_every_n_steps: 1000
  keep_last_n_checkpoints: 3

  # Logging
  log_every_n_steps: 50
  use_wandb: true
  wandb_project: "pdf2latex"
  wandb_run_name: "pretrain-v1"

  # Validation
  val_every_n_steps: 500
  val_max_batches: 50              # cap val to speed up training
